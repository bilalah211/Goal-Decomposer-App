name: goal_decomposer
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  #---[Packages]---
  cupertino_icons: ^1.0.8

  #Database Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  #Statemanagment
  provider: ^6.1.5+1
  #http
  http: ^1.6.0
  #Notification
  flutter_local_notifications: ^17.2.3
  #Launcher Icon
  flutter_launcher_icons: ^0.14.4
  #Securing your Private Keys
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/png/launcher_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/png/launcher_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/png/launcher_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/png/launcher_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/png/launcher_icon.png"

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  #--Images
  assets:
    - assets/png/
    - .env

   
   
   
   

   
   

   
   

   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
